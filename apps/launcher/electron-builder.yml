appId: com.balumbacraft.launcher
productName: BalumbaCraft
copyright: BalumbaCraft
# Pinned so electron-builder can resolve the version under npm workspaces
# (electron is hoisted to the repo-root node_modules).
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Bundle nothing from node_modules that isn't needed at runtime; electron-builder
# resolves production deps automatically.
asarUnpack:
  - resources/**
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.exe
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BalumbaCraft
# Self-update feed: GitHub Releases of the launcher repo. electron-updater in the
# app reads this to auto-download launcher updates.
publish:
  provider: github
  owner: lukianovanton
  repo: balcraft
