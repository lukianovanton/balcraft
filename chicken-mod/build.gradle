plugins {
    id 'net.neoforged.moddev' version '2.0.78'
}

version = '0.1.1'
group = 'com.gearhaven'
base { archivesName = 'gearhaven-chicken' }

java {
    toolchain { languageVersion = JavaLanguageVersion.of(21) }
}

repositories { mavenCentral() }

neoForge {
    version = '21.1.209'
    mods {
        gearhavenchicken {
            sourceSet sourceSets.main
        }
    }
}
